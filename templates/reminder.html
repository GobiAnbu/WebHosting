<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Reminder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            padding: 30px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }
        .header .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,165,0,0.15);
            color: #FF9800;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .header h1 {
            color: #fff;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .header p {
            color: rgba(255,255,255,0.5);
            font-size: 0.95rem;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            transition: background 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }

        .user-profile { position: fixed; top: 20px; right: 20px; z-index: 200; }
        .user-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #00b4d8, #0077b6); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; box-shadow: 0 2px 12px rgba(0,180,216,0.35); border: 2px solid rgba(255,255,255,0.15); }
        .user-avatar:hover { transform: scale(1.1); box-shadow: 0 4px 20px rgba(0,180,216,0.5); }
        .user-dropdown { position: absolute; top: 54px; right: 0; background: rgba(12,20,33,0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; min-width: 270px; box-shadow: 0 16px 48px rgba(0,0,0,0.5); overflow: hidden; opacity: 0; transform: translateY(-8px); pointer-events: none; transition: all 0.2s ease; }
        .user-dropdown.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .user-dropdown-header { display: flex; align-items: center; gap: 14px; padding: 20px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .user-dropdown-avatar-wrap { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #00b4d8, #0077b6); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.2rem; font-weight: 700; flex-shrink: 0; }
        .user-dropdown-info { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
        .user-dropdown-name { color: #fff; font-size: 1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-dropdown-role { display: inline-block; width: fit-content; padding: 2px 10px; border-radius: 999px; font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .ud-role-admin { background: rgba(255,82,82,0.12); color: #ff6b6b; }
        .ud-role-user { background: rgba(0,180,216,0.12); color: #00b4d8; }
        .user-dropdown-menu { padding: 8px; }
        .user-dropdown-link { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px; background: none; border: none; border-radius: 10px; color: rgba(255,255,255,0.7); font-size: 0.85rem; font-weight: 500; font-family: 'Inter', sans-serif; cursor: pointer; text-decoration: none; transition: all 0.15s; }
        .user-dropdown-link:hover { background: rgba(255,255,255,0.07); color: #fff; }
        .user-dropdown-logout { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px; background: none; border: none; border-radius: 10px; color: #ff6b6b; font-size: 0.85rem; font-weight: 500; font-family: 'Inter', sans-serif; cursor: pointer; text-decoration: none; transition: all 0.15s; }
        .user-dropdown-logout:hover { background: rgba(255,82,82,0.1); }
        .container {
            max-width: 1400px;
            margin: auto;
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }
        .left-panel { flex: 1; position: sticky; top: 30px; }
        .right-panel { flex: 1; }
        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .left-panel { position: static; width: 100%; }
            .right-panel { width: 100%; }
            .phone-frame { width: 100% !important; max-width: 100%; }
            .back-btn { position: static; display: inline-block; margin-bottom: 16px; }
            .header h1 { font-size: 1.5rem; }
            .header p { font-size: 0.8rem; }
            .card { padding: 16px; }
            body { padding: 16px 12px; }
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.3rem; }
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .card-title {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .form-group { margin-bottom: 14px; }
        .form-label {
            display: block;
            color: rgba(255,255,255,0.6);
            font-size: 0.82rem;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 0.92rem;
            outline: none;
            transition: border 0.2s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            border-color: #FF9800;
        }
        .form-textarea {
            min-height: 120px;
            resize: vertical;
            font-family: 'Inter', sans-serif;
        }
        .form-select option { background: #1a2a3a; color: #fff; }
        .btn-send {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 8px;
        }
        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255,152,0,0.3);
        }

        /* Phone Preview */
        .phone-frame {
            width: 350px;
            margin: auto;
            background: #0b141a;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.08);
        }
        .phone-header {
            background: #1f2c34;
            padding: 8px 12px;
        }
        .phone-status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }
        .phone-contact-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .phone-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #25D366;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        .phone-contact-name {
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .phone-chat {
            padding: 16px 10px;
            min-height: 260px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><rect fill="%23080e13" width="300" height="300"/></svg>');
        }
        .wa-date-chip {
            text-align: center;
            margin-bottom: 12px;
        }
        .wa-date-chip::after {
            content: 'Today';
            background: #182229;
            color: rgba(255,255,255,0.5);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
        }
        .wa-bubble {
            background: #005c4b;
            color: #e9edef;
            padding: 8px 10px 4px;
            border-radius: 8px 8px 0 8px;
            max-width: 85%;
            margin-left: auto;
            font-size: 0.82rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .wa-bubble-time {
            text-align: right;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.45);
            margin-top: 2px;
        }
        .wa-bubble { cursor: pointer; transition: background 0.2s; }
        .wa-bubble:active { background: rgba(37,211,102,0.25); }
        .copy-btn {
            display: block; width: 100%; margin-top: 12px; padding: 10px;
            background: rgba(37,211,102,0.15); border: 1px solid rgba(37,211,102,0.3);
            border-radius: 10px; color: #25D366; font-size: 0.88rem; font-weight: 600;
            font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s;
        }
        .copy-btn:hover { background: rgba(37,211,102,0.25); }
        .copy-toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: #25D366; color: #fff; padding: 10px 24px; border-radius: 12px;
            font-size: 0.88rem; font-weight: 600; box-shadow: 0 4px 20px rgba(37,211,102,0.4);
            opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 9999;
        }
        .copy-toast.show { opacity: 1; }
        .phone-input-bar {
            background: #1f2c34;
            padding: 8px 10px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .phone-input-field {
            flex: 1;
            background: #2a3942;
            border-radius: 18px;
            padding: 8px 14px;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
        }
        .phone-mic { font-size: 1.1rem; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 0.9rem;
            transition: transform 0.4s ease;
            z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .member-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        .chip {
            background: rgba(255,152,0,0.15);
            color: #FF9800;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chip:hover { background: rgba(255,152,0,0.3); }
        .chip.selected {
            background: #FF9800;
            color: #fff;
        }
    </style>
</head>
<body>
<script>if (!sessionStorage.getItem("loggedIn")) { window.location.href = "/logout"; }</script>
    <a class="back-btn" href="/">🏠 Home</a>
    <div class="user-profile">
        <div class="user-avatar" id="userAvatar" onclick="document.getElementById('userDropdown').classList.toggle('show')">?</div>
        <div class="user-dropdown" id="userDropdown">
            <div class="user-dropdown-header">
                <div class="user-dropdown-avatar-wrap" id="userAvatarLarge">?</div>
                <div class="user-dropdown-info">
                    <div class="user-dropdown-name" id="userName">—</div>
                    <span class="user-dropdown-role ud-role-user" id="userRole">user</span>
                </div>
            </div>
            <div class="user-dropdown-menu">
                <a href="/" class="user-dropdown-link">🏠 Home</a>
                <a href="/logout" class="user-dropdown-logout" onclick="sessionStorage.clear()">🚪 Logout</a>
            </div>
        </div>
    </div>

    <div class="header">
        <div class="pill">🔔 REMINDER</div>
        <h1>Send Payment Reminder</h1>
        <p>Send reminder messages to chit members via WhatsApp</p>
    </div>

    <div class="container">
        <!-- LEFT PANEL - Phone Preview -->
        <div class="left-panel">
            <div class="card">
                <div class="card-title">📱 WhatsApp Preview</div>
                <div class="phone-frame">
                <div class="phone-header">
                    <div class="phone-status-bar">
                        <span>9:41</span>
                        <span>●●● WiFi 🔋</span>
                    </div>
                    <div class="phone-contact-bar">
                        <div class="phone-avatar">👤</div>
                        <div>
                            <div class="phone-contact-name" id="previewName">Member</div>
                            <div style="font-size:0.65rem; color:rgba(255,255,255,0.4);">online</div>
                        </div>
                    </div>
                </div>
                <div class="phone-chat">
                    <div class="wa-date-chip"></div>
                    <div class="wa-bubble">
                        <span id="waPreviewText">Details Loading Please wait...</span>
                        <div class="wa-bubble-time" id="waPreviewTime">9:41 AM ✓✓</div>
                    </div>
                </div>
                <div class="phone-input-bar">
                    <div class="phone-input-field">Type a message</div>
                    <div class="phone-mic">🎤</div>
                </div>
                </div>
                <button class="copy-btn" onclick="copyPreviewText()">📋 Copy Message</button>
                <div class="copy-toast" id="copyToast">✅ Copied to clipboard!</div>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">
            <div class="card">
                <div class="card-title">📝 Reminder Message</div>

                <div class="form-group">
                    <label class="form-label">📁 Chit </label>
                    <select class="form-select" id="chitFileSelect"></select>
                </div>

                <div class="form-group">
                    <label class="form-label">Message</label>
                    <textarea class="form-textarea" id="reminderMessage" placeholder="Type your reminder message here...">🔔 Reminder for *{chitName}*

Hi {name} 👋,

This is a friendly reminder to pay your chit amount of *₹{amount}* for this month.

💳 Gpay/PhonePe to *{gpay}*

Please make the payment at the earliest if not done.

———————————

🔔 *{chitName}* நினைவூட்டல்

நட்பான நினைவூட்டல்: இந்த மாதத்திற்கான உங்கள் சிட் தொகை *₹{amount}* செலுத்தவும், இன்னும் செலுத்தவில்லை என்றால்.

💳 Gpay/PhonePe க்கு *{gpay}*

Thank you! 🙏</textarea>
                </div>
            </div>

            <button class="btn-send" onclick="sendReminder()">🔔 Send Reminder</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div id="popupOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:2000; justify-content:center; align-items:center;">
        <div style="background:#1a2a3a; border:1px solid rgba(255,255,255,0.15); border-radius:20px; padding:30px; max-width:400px; width:90%; text-align:center;">
            <p id="popupMsg" style="color:#fff; font-size:1.1rem; margin-bottom:20px;"></p>
            <button onclick="closePopup()" style="padding:10px 40px; background:linear-gradient(135deg,#FF9800,#F57C00); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer;">OK</button>
        </div>
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    let chitFile = urlParams.get("chitFile") || "";

    function setFieldsDisabled(disabled) {
        document.querySelectorAll('.right-panel .form-select, .right-panel .form-textarea, .btn-send').forEach(el => {
            if (el.id !== 'chitFileSelect') {
                el.disabled = disabled;
                el.style.opacity = disabled ? '0.4' : '1';
            }
        });
    }

    // Load chit files dropdown
    fetch("/get-chit-files")
        .then(r => r.json())
        .then(files => {
            const sel = document.getElementById("chitFileSelect");
            sel.innerHTML = '<option value="">-- Select Chit --</option>';
            files.forEach(f => {
                const opt = document.createElement("option");
                opt.value = f;
                opt.textContent = f.replace(".xlsx", "");
                if (f === chitFile) opt.selected = true;
                sel.appendChild(opt);
            });
            if (chitFile) loadData();
            else setFieldsDisabled(true);
        });

    document.getElementById("chitFileSelect").addEventListener("change", function() {
        if (this.value) {
            window.location.href = `/reminder?chitFile=${this.value}`;
        } else {
            setFieldsDisabled(true);
        }
    });

    let allMembers = [];
    let chitAmount = "0";
    let gpayNumber = "";
    let chitName = "";

    function loadData() {
        setFieldsDisabled(false);

        fetch(`/get-names?chitFile=${chitFile}`)
            .then(r => r.json())
            .then(data => { allMembers = data; });

        fetch(`/get-chit-number?chitFile=${chitFile}`)
            .then(r => r.json())
            .then(data => {
                chitAmount = data.amountPerPerson || "0";
                gpayNumber = data.gpay || "";
                chitName = data.chitName || chitFile.replace(".xlsx", "");
                updatePreview();
            });
    }

    // Set current time
    document.getElementById("waPreviewTime").textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + ' ✓✓';

    // Update preview on message change
    document.getElementById("reminderMessage").addEventListener("input", updatePreview);

    function updatePreview() {
        const msg = document.getElementById("reminderMessage").value
            .replace(/{chitName}/g, chitName)
            .replace(/{name}/g, "Member")
            .replace(/{amount}/g, chitAmount)
            .replace(/{gpay}/g, gpayNumber);
        document.getElementById("waPreviewText").innerText = msg;
        const now = new Date();
        document.getElementById("waPreviewTime").textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + ' ✓✓';
    }
    updatePreview();

    function sendReminder() {
        const message = document.getElementById("reminderMessage").value;
        if (!message.trim()) { showToast("⚠️ Please enter a message!"); return; }

        showToast("📤 Sending reminders...");
        fetch("/send-reminder", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: message, members: allMembers, chitFile: chitFile })
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                showPopup("✅ Reminder sent successfully via WhatsApp!");
            } else {
                showPopup("❌ Failed: " + (data.error || "Unknown error"));
            }
        })
        .catch(() => showPopup("❌ Error sending reminders!"));
    }

    function showPopup(msg) {
        document.getElementById("popupMsg").textContent = msg;
        document.getElementById("popupOverlay").style.display = "flex";
    }

    function closePopup() {
        document.getElementById("popupOverlay").style.display = "none";
        window.location.href = "/reminder";
    }

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3500);
    }

    document.addEventListener('click', function(e) { if (!e.target.closest('.user-profile')) document.getElementById('userDropdown').classList.remove('show'); });
    fetch('/check-role').then(r=>r.json()).then(data=>{
        const initial = (data.username||'?').charAt(0).toUpperCase();
        document.getElementById('userAvatar').textContent = initial;
        document.getElementById('userAvatarLarge').textContent = initial;
        document.getElementById('userName').textContent = data.username||'—';
        const r = document.getElementById('userRole'); r.textContent = data.role; r.className = 'user-dropdown-role ' + (data.role==='admin'?'ud-role-admin':'ud-role-user');
    });

    function copyPreviewText() {
        const text = document.getElementById("waPreviewText").innerText;
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById("copyToast");
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2000);
        }).catch(() => {
            const ta = document.createElement("textarea");
            ta.value = document.getElementById("waPreviewText").innerText;
            document.body.appendChild(ta); ta.select(); document.execCommand("copy");
            document.body.removeChild(ta);
            const toast = document.getElementById("copyToast");
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2000);
        });
    }
    document.querySelector(".wa-bubble").addEventListener("click", copyPreviewText);
</script>
</body>
</html>
