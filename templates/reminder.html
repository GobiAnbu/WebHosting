<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Reminder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            padding: 30px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }
        .header .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,165,0,0.15);
            color: #FF9800;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .header h1 {
            color: #fff;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .header p {
            color: rgba(255,255,255,0.5);
            font-size: 0.95rem;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            transition: background 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .container {
            max-width: 1400px;
            margin: auto;
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }
        .left-panel { flex: 1; position: sticky; top: 30px; }
        .right-panel { flex: 1; }
        @media (max-width: 900px) {
            .container { flex-direction: column; }
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .card-title {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .form-group { margin-bottom: 14px; }
        .form-label {
            display: block;
            color: rgba(255,255,255,0.6);
            font-size: 0.82rem;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 0.92rem;
            outline: none;
            transition: border 0.2s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            border-color: #FF9800;
        }
        .form-textarea {
            min-height: 120px;
            resize: vertical;
            font-family: 'Inter', sans-serif;
        }
        .form-select option { background: #1a2a3a; color: #fff; }
        .btn-send {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 8px;
        }
        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255,152,0,0.3);
        }

        /* Phone Preview */
        .phone-frame {
            width: 350px;
            margin: auto;
            background: #0b141a;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.08);
        }
        .phone-header {
            background: #1f2c34;
            padding: 8px 12px;
        }
        .phone-status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }
        .phone-contact-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .phone-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #25D366;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        .phone-contact-name {
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .phone-chat {
            padding: 16px 10px;
            min-height: 260px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><rect fill="%23080e13" width="300" height="300"/></svg>');
        }
        .wa-date-chip {
            text-align: center;
            margin-bottom: 12px;
        }
        .wa-date-chip::after {
            content: 'Today';
            background: #182229;
            color: rgba(255,255,255,0.5);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
        }
        .wa-bubble {
            background: #005c4b;
            color: #e9edef;
            padding: 8px 10px 4px;
            border-radius: 8px 8px 0 8px;
            max-width: 85%;
            margin-left: auto;
            font-size: 0.82rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .wa-bubble-time {
            text-align: right;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.45);
            margin-top: 2px;
        }
        .phone-input-bar {
            background: #1f2c34;
            padding: 8px 10px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .phone-input-field {
            flex: 1;
            background: #2a3942;
            border-radius: 18px;
            padding: 8px 14px;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
        }
        .phone-mic { font-size: 1.1rem; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 0.9rem;
            transition: transform 0.4s ease;
            z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .member-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        .chip {
            background: rgba(255,152,0,0.15);
            color: #FF9800;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chip:hover { background: rgba(255,152,0,0.3); }
        .chip.selected {
            background: #FF9800;
            color: #fff;
        }
    </style>
</head>
<body>
    <a class="back-btn" href="/">🏠 Home</a>

    <div class="header">
        <div class="pill">🔔 REMINDER</div>
        <h1>Send Payment Reminder</h1>
        <p>Send reminder messages to chit members via WhatsApp</p>
    </div>

    <div class="container">
        <!-- LEFT PANEL - Phone Preview -->
        <div class="left-panel">
            <div class="card">
                <div class="card-title">📱 WhatsApp Preview</div>
                <div class="phone-frame">
                <div class="phone-header">
                    <div class="phone-status-bar">
                        <span>9:41</span>
                        <span>●●● WiFi 🔋</span>
                    </div>
                    <div class="phone-contact-bar">
                        <div class="phone-avatar">👤</div>
                        <div>
                            <div class="phone-contact-name" id="previewName">Member</div>
                            <div style="font-size:0.65rem; color:rgba(255,255,255,0.4);">online</div>
                        </div>
                    </div>
                </div>
                <div class="phone-chat">
                    <div class="wa-date-chip"></div>
                    <div class="wa-bubble">
                        <span id="waPreviewText">Details Loading Please wait...</span>
                        <div class="wa-bubble-time" id="waPreviewTime">9:41 AM ✓✓</div>
                    </div>
                </div>
                <div class="phone-input-bar">
                    <div class="phone-input-field">Type a message</div>
                    <div class="phone-mic">🎤</div>
                </div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">
            <div class="card">
                <div class="card-title">📝 Reminder Message</div>

                <div class="form-group">
                    <label class="form-label">📁 Chit </label>
                    <select class="form-select" id="chitFileSelect"></select>
                </div>

                <div class="form-group">
                    <label class="form-label">Message</label>
                    <textarea class="form-textarea" id="reminderMessage" placeholder="Type your reminder message here...">Hi {name} 👋,

This is a friendly reminder to pay your chit amount of *₹{amount}* for this month.

Please make the payment at the earliest if not done.

நட்பான நினைவூட்டல்: இந்த மாதத்திற்கான உங்கள் சிட் தொகை *₹{amount}* செலுத்தவும், இன்னும் செலுத்தவில்லை என்றால்.

Thank you! 🙏</textarea>
                </div>
            </div>

            <button class="btn-send" onclick="sendReminder()">🔔 Send Reminder</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    let chitFile = urlParams.get("chitFile") || "";

    function setFieldsDisabled(disabled) {
        document.querySelectorAll('.right-panel .form-select, .right-panel .form-textarea, .btn-send').forEach(el => {
            if (el.id !== 'chitFileSelect') {
                el.disabled = disabled;
                el.style.opacity = disabled ? '0.4' : '1';
            }
        });
        document.getElementById("memberChips").style.opacity = disabled ? '0.4' : '1';
        document.getElementById("memberChips").style.pointerEvents = disabled ? 'none' : 'auto';
    }

    // Load chit files dropdown
    fetch("/get-chit-files")
        .then(r => r.json())
        .then(files => {
            const sel = document.getElementById("chitFileSelect");
            sel.innerHTML = '<option value="">-- Select Chit --</option>';
            files.forEach(f => {
                const opt = document.createElement("option");
                opt.value = f;
                opt.textContent = f.replace(".xlsx", "");
                if (f === chitFile) opt.selected = true;
                sel.appendChild(opt);
            });
            if (chitFile) loadData();
            else setFieldsDisabled(true);
        });

    document.getElementById("chitFileSelect").addEventListener("change", function() {
        if (this.value) {
            window.location.href = `/reminder?chitFile=${this.value}`;
        } else {
            setFieldsDisabled(true);
        }
    });

    let allMembers = [];
    let chitAmount = "0";

    function loadData() {
        setFieldsDisabled(false);

        // Load members
        fetch(`/get-names?chitFile=${chitFile}`)
            .then(r => r.json())
            .then(data => {
                allMembers = data;
                const chips = document.getElementById("memberChips");
                chips.innerHTML = "";
                data.forEach((item, i) => {
                    const chip = document.createElement("span");
                    chip.className = "chip selected";
                    chip.textContent = item.name;
                    chip.dataset.index = i;
                    chip.onclick = () => chip.classList.toggle("selected");
                    chips.appendChild(chip);
                });
            });

        // Load amount from chitNumberDetails
        fetch(`/get-chit-number?chitFile=${chitFile}`)
            .then(r => r.json())
            .then(data => {
                chitAmount = data.amountPerPerson || "0";
                updatePreview();
            });
    }

    // Set current time
    document.getElementById("waPreviewTime").textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + ' ✓✓';

    // Update preview on message change
    document.getElementById("reminderMessage").addEventListener("input", updatePreview);

    function updatePreview() {
        const msg = document.getElementById("reminderMessage").value
            .replace(/{name}/g, "Member")
            .replace(/{amount}/g, chitAmount);
        document.getElementById("waPreviewText").innerText = msg;
        const now = new Date();
        document.getElementById("waPreviewTime").textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + ' ✓✓';
    }
    updatePreview();

    function sendReminder() {
        const chips = document.querySelectorAll(".chip.selected");
        if (chips.length === 0) { showToast("⚠️ Please select at least one member!"); return; }

        const message = document.getElementById("reminderMessage").value;
        if (!message.trim()) { showToast("⚠️ Please enter a message!"); return; }

        const selectedMembers = [];
        chips.forEach(chip => {
            const idx = parseInt(chip.dataset.index);
            selectedMembers.push(allMembers[idx]);
        });

        fetch("/send-reminder", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: message, members: selectedMembers, chitFile: chitFile })
        })
        .then(r => r.json())
        .then(data => {
            if (data.results && data.results.length > 0) {
                let i = 0;
                function openNext() {
                    if (i < data.results.length) {
                        window.open(data.results[i].url, '_blank');
                        i++;
                        setTimeout(openNext, 1500);
                    }
                }
                openNext();
                showToast(`✅ Sending reminder to ${data.results.length} members!`);
            } else {
                showToast("⚠️ No members found!");
            }
        })
        .catch(() => showToast("❌ Error sending reminders!"));
    }

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3500);
    }
</script>
</body>
</html>
